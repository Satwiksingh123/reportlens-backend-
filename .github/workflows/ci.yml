name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  packages:
    runs-on: ubuntu-latest
    strategy:
      # one failing package shouldn't cancel the others - we want the full picture
      fail-fast: false
      matrix:
        pkg: [medical_parser, data_synthesis, llm_service, rag, ocr_engine]
    defaults:
      run:
        working-directory: services/${{ matrix.pkg }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
